<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アルファベット大文字かるた | 小学校外国語アプリポータル</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0f4f8; --ink:#2d3436; --sub:#7f8c9b;
  --primary:#ffa502; --teal:#00cec9; --pink:#ff7675; --blue:#74b9ff; --green:#2ed573; --purple:#a29bfe;
  --shadow:0 4px 10px rgba(0,0,0,.08); --shadow-hover:0 10px 25px rgba(0,0,0,.15);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'M PLUS Rounded 1c',sans-serif;background:var(--bg);color:var(--ink);
  background-image:radial-gradient(#ffffff 20%,transparent 20%),radial-gradient(#ffffff 20%,transparent 20%);
  background-position:0 0,20px 20px;background-size:40px 40px;
  min-height:100vh;touch-action:manipulation;-webkit-user-select:none;user-select:none;
}
header{
  background:rgba(255,255,255,.95);padding:8px 16px;display:flex;justify-content:space-between;align-items:center;
  box-shadow:0 4px 15px rgba(0,0,0,.05);position:sticky;top:0;z-index:50;gap:8px;flex-wrap:wrap;
}
header h1{font-size:1.05rem;font-weight:800;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
header h1 .u{font-size:.7rem;color:#fff;background:var(--primary);padding:2px 10px;border-radius:50px}
.nav-btn{
  background:#636e72;color:#fff;border:none;padding:8px 16px;border-radius:50px;font-weight:700;cursor:pointer;
  font-family:inherit;font-size:.8rem;box-shadow:var(--shadow);transition:.2s;min-height:44px;
}
.nav-btn:hover{background:var(--primary);transform:translateY(-2px)}
main{max-width:960px;margin:0 auto;padding:16px 16px 60px}
.step-title{text-align:center;margin:16px 0 4px;font-size:1.3rem;font-weight:800}
.step-sub{text-align:center;color:var(--sub);font-weight:700;font-size:.85rem;margin-bottom:16px}

/* モード選択 */
.mode-select{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-top:16px}
.mode-card{
  width:250px;background:#fff;border-radius:24px;padding:24px 18px;text-align:center;cursor:pointer;
  box-shadow:var(--shadow);border:5px solid transparent;transition:.25s;
}
.mode-card:hover{transform:translateY(-5px);box-shadow:var(--shadow-hover)}
.mode-card.m1{border-color:var(--teal)} .mode-card.m2{border-color:var(--pink)} .mode-card.m3{border-color:var(--purple)}
.mode-card .mi{font-size:3rem}
.mode-card h2{font-size:1.15rem;font-weight:800;margin-top:8px}
.mode-card p{font-size:.8rem;color:var(--sub);font-weight:700;margin-top:6px;line-height:1.6}

/* はんい設定 */
.range-row{display:flex;gap:10px;justify-content:center;margin-top:22px;flex-wrap:wrap;align-items:center}
.range-row .lbl{font-weight:800;color:var(--sub);font-size:.9rem}
.range-btn{
  border:3px solid #e6ecf2;background:#fff;border-radius:50px;padding:8px 20px;font-family:inherit;
  font-weight:800;font-size:.95rem;cursor:pointer;min-height:44px;color:var(--sub);transition:.2s;
}
.range-btn.on{background:var(--primary);border-color:var(--primary);color:#fff}

/* かるた盤面 */
.hud{
  display:flex;justify-content:space-between;align-items:center;background:#fff;border-radius:50px;
  box-shadow:var(--shadow);padding:8px 20px;margin-bottom:14px;font-weight:800;gap:10px;flex-wrap:wrap;
}
.hud .call-word{font-family:'Fredoka One',cursive;font-size:1.2rem;color:var(--primary)}
.board{display:grid;gap:10px;grid-template-columns:repeat(auto-fill,minmax(88px,1fr))}
.karuta{
  aspect-ratio:3/4;background:#fff;border-radius:16px;box-shadow:var(--shadow);border:4px solid #ffeacc;
  font-family:'Fredoka One',cursive;font-size:2.6rem;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:.15s;color:var(--ink);
}
.karuta:hover{transform:translateY(-3px)}
.karuta.taken{opacity:.18;pointer-events:none;transform:scale(.92)}
.karuta.correct{background:var(--green);color:#fff;border-color:var(--green);animation:pop .45s}
.karuta.wrong{animation:shake .35s;border-color:var(--pink)}
@keyframes pop{0%{transform:scale(.6)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

.big-btn{
  border:none;border-radius:50px;padding:14px 32px;font-family:inherit;font-weight:800;font-size:1.05rem;
  cursor:pointer;box-shadow:var(--shadow);min-height:52px;transition:.2s;color:#fff;background:var(--primary);
}
.big-btn:hover{transform:translateY(-2px)}
.big-btn.teal{background:var(--teal)}
.actions{display:flex;gap:12px;justify-content:center;margin-top:18px;flex-wrap:wrap}

/* もじさがし */
.search-visual{
  width:190px;height:190px;margin:0 auto 4px;background:#fff;border-radius:24px;box-shadow:var(--shadow-hover);
  display:flex;align-items:center;justify-content:center;font-size:5.5rem;border:6px solid #fff;overflow:hidden;
}
.search-visual img{width:100%;height:100%;object-fit:contain}
.search-word{text-align:center;font-family:'Fredoka One',cursive;font-size:1.5rem;color:var(--purple);margin-bottom:10px;min-height:38px}

/* けっか */
.result-box{max-width:460px;margin:20px auto;background:#fff;border-radius:24px;box-shadow:var(--shadow-hover);padding:24px;text-align:center;border:5px solid var(--primary)}
.result-box h2{font-size:1.3rem;font-weight:800}
.result-box .big{font-size:4rem;animation:pop .5s}
.rank-list{margin-top:12px;text-align:left}
.rank-item{display:flex;justify-content:space-between;font-weight:800;padding:6px 12px;border-radius:10px;background:#fff8ec;margin-bottom:5px}
.rank-item .rl{font-family:'Fredoka One',cursive;color:var(--primary)}
.hidden{display:none!important}
footer{text-align:center;padding:20px;color:#b2bec3;font-size:.75rem;font-weight:700}
</style>
</head>
<body>

<header>
  <h1>🅰️ アルファベット大文字かるた <span class="u">3年生 アルファベット大文字</span></h1>
  <div style="display:flex;gap:8px">
    <button class="nav-btn" id="btn-home">モードせんたく</button>
    <a class="nav-btn" href="../index.html" style="background:#b2bec3;color:#2d3436;display:inline-flex;align-items:center">ポータルへ</a>
  </div>
</header>

<main>

  <!-- モード選択 -->
  <section id="scr-mode">
    <h2 class="step-title">あそびかたを えらんでね</h2>
    <div class="mode-select">
      <div class="mode-card m1" data-mode="personal">
        <div class="mi">🎧</div>
        <h2>ひとりで れんしゅう</h2>
        <p>音を聞いて カードをタップ!<br>はやさランキングも出るよ</p>
      </div>
      <div class="mode-card m2" data-mode="board">
        <div class="mi">📺</div>
        <h2>でんしこくばんで みんなで</h2>
        <p>おおきな画面で みんなでかるた。<br>だれが はやいかな?</p>
      </div>
      <div class="mode-card m3" data-mode="search">
        <div class="mi">🔍</div>
        <h2>もじさがし</h2>
        <p>「Apple は なにで はじまる?」<br>あたまの文字を さがそう</p>
      </div>
    </div>
    <div class="range-row">
      <span class="lbl">つかう文字:</span>
      <button class="range-btn on" data-r="all">A〜Z ぜんぶ</button>
      <button class="range-btn" data-r="first">A〜M</button>
      <button class="range-btn" data-r="second">N〜Z</button>
    </div>
  </section>

  <!-- かるた盤面(ひとり/電子黒板 共通) -->
  <section id="scr-board" class="hidden">
    <div class="hud">
      <span id="hud-left">のこり 26まい</span>
      <span class="call-word" id="hud-call">🔊 よく聞いてね…</span>
      <button class="nav-btn" id="btn-repeat" style="background:var(--blue)">🔊 もういちど</button>
    </div>
    <div class="board" id="board"></div>
  </section>

  <!-- もじさがし -->
  <section id="scr-search" class="hidden">
    <div class="search-visual" id="search-visual">🍎</div>
    <div class="search-word" id="search-word">Apple starts with ... ?</div>
    <div class="hud">
      <span id="s-hud-left"></span>
      <span id="s-score" style="color:var(--green)">せいかい 0</span>
      <button class="nav-btn" id="btn-repeat2" style="background:var(--blue)">🔊 もういちど</button>
    </div>
    <div class="board" id="board2"></div>
  </section>

  <!-- けっか -->
  <section id="scr-result" class="hidden">
    <div class="result-box">
      <div class="big" id="res-emoji">🏆</div>
      <h2 id="res-title">クリア!</h2>
      <div class="rank-list" id="res-ranks"></div>
      <div class="actions">
        <button class="big-btn" id="btn-again">もういちど!</button>
        <button class="big-btn teal" id="btn-home2">モードせんたく</button>
      </div>
    </div>
  </section>

</main>

<footer>音がでないときは、いちど画面をタップしてから「🔊もういちど」をおしてね</footer>

<script>
// ============================================================
// データ(教師向け:ここを書きかえると内容を変更できます)
// ============================================================
// もじさがし用のことば(word の頭文字が正解になります)
const SEARCH_WORDS = [
  { word:"Apple",    emoji:"🍎" }, { word:"Banana",   emoji:"🍌" }, { word:"Cat",      emoji:"🐱" },
  { word:"Dog",      emoji:"🐶" }, { word:"Elephant", emoji:"🐘" }, { word:"Fish",     emoji:"🐟" },
  { word:"Gorilla",  emoji:"🦍" }, { word:"Hat",      emoji:"🎩" }, { word:"Ice cream",emoji:"🍦" },
  { word:"Jet",      emoji:"✈️" }, { word:"King",     emoji:"👑" }, { word:"Lion",     emoji:"🦁" },
  { word:"Monkey",   emoji:"🐵" }, { word:"Notebook", emoji:"📓" }, { word:"Orange",   emoji:"🍊" },
  { word:"Pig",      emoji:"🐷" }, { word:"Queen",    emoji:"👸" }, { word:"Rabbit",   emoji:"🐰" },
  { word:"Sun",      emoji:"☀️" }, { word:"Tiger",    emoji:"🐯" }, { word:"Umbrella", emoji:"☔" },
  { word:"Violin",   emoji:"🎻" }, { word:"Watch",    emoji:"⌚" }, { word:"Xylophone",emoji:"🎹" },
  { word:"Yo-yo",    emoji:"🪀" }, { word:"Zebra",    emoji:"🦓" },
];
const SEARCH_COUNT = 8; // もじさがしの問題数

// ============================================================
// 音声
// ============================================================
function speak(text, rate = 0.8){
  try{
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "en-US"; u.rate = rate;
    speechSynthesis.speak(u);
  }catch(e){}
}

// ============================================================
// 状態
// ============================================================
const ALL = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
let range = "all";
let mode = null;
let letters = [], order = [], orderIdx = 0, target = null;
let times = [], callAt = 0;
let sQuiz = [], sIdx = 0, sScore = 0, sAnswered = false;

const $ = id => document.getElementById(id);
function show(id){
  ["scr-mode","scr-board","scr-search","scr-result"].forEach(s =>
    $(s).classList.toggle("hidden", s !== id));
}
function rangeLetters(){
  if(range === "first") return ALL.slice(0,13);
  if(range === "second") return ALL.slice(13);
  return ALL.slice();
}
function shuffle(a){ return [...a].sort(() => Math.random() - .5); }

document.querySelectorAll(".range-btn").forEach(b => b.addEventListener("click", () => {
  document.querySelectorAll(".range-btn").forEach(x => x.classList.remove("on"));
  b.classList.add("on"); range = b.dataset.r;
}));

// ============================================================
// かるた(ひとり/電子黒板)
// ============================================================
function startKaruta(m){
  mode = m;
  letters = shuffle(rangeLetters());
  order = shuffle(letters);
  orderIdx = 0; times = [];
  $("board").innerHTML = letters.map(L =>
    `<div class="karuta" data-l="${L}">${L}</div>`).join("");
  show("scr-board");
  setTimeout(callNext, 900);
}
function callNext(){
  if(orderIdx >= order.length){ finishKaruta(); return; }
  target = order[orderIdx];
  $("hud-left").textContent = `のこり ${order.length - orderIdx}まい`;
  $("hud-call").textContent = "🔊 よく聞いてね…";
  speak(target);
  callAt = Date.now();
}
$("btn-repeat").addEventListener("click", () => { if(target) speak(target); });
$("board").addEventListener("click", e => {
  const el = e.target.closest(".karuta"); if(!el || !target) return;
  if(el.dataset.l === target){
    const ms = Date.now() - callAt;
    times.push({ letter: target, ms });
    el.classList.add("correct");
    $("hud-call").textContent = `⭕ ${target}!(${(ms/1000).toFixed(1)}びょう)`;
    speak(target);
    const t = target; target = null;
    setTimeout(() => {
      el.classList.remove("correct"); el.classList.add("taken");
      orderIdx++;
      callNext();
    }, 900);
  }else{
    el.classList.add("wrong");
    setTimeout(() => el.classList.remove("wrong"), 380);
  }
});
function finishKaruta(){
  const fastest = [...times].sort((a,b) => a.ms - b.ms).slice(0,5);
  const avg = times.length ? times.reduce((s,t) => s + t.ms, 0) / times.length : 0;
  $("res-emoji").textContent = "🏆";
  $("res-title").textContent = mode === "board" ? "みんな よくできました!" : "ぜんぶ とれたね!";
  $("res-ranks").innerHTML =
    `<div class="rank-item"><span>へいきん</span><span class="rl">${(avg/1000).toFixed(1)}びょう</span></div>` +
    fastest.map((t,i) =>
      `<div class="rank-item"><span>はやかった文字 ${i+1}い: ${t.letter}</span><span class="rl">${(t.ms/1000).toFixed(1)}びょう</span></div>`).join("");
  show("scr-result");
  speak("Great job!");
}

// ============================================================
// もじさがし
// ============================================================
function startSearch(){
  mode = "search";
  const pool = SEARCH_WORDS.filter(w => rangeLetters().includes(w.word[0].toUpperCase()));
  sQuiz = shuffle(pool).slice(0, SEARCH_COUNT);
  sIdx = 0; sScore = 0;
  letters = shuffle(rangeLetters());
  $("board2").innerHTML = letters.map(L =>
    `<div class="karuta" data-l="${L}">${L}</div>`).join("");
  show("scr-search");
  showSearchQ();
}
function showSearchQ(){
  if(sIdx >= sQuiz.length){ finishSearch(); return; }
  sAnswered = false;
  const q = sQuiz[sIdx];
  $("search-visual").textContent = q.emoji;
  $("search-word").textContent = `${q.word} starts with ... ?`;
  $("s-hud-left").textContent = `だい${sIdx+1}もん / ${sQuiz.length}もん`;
  $("s-score").textContent = `せいかい ${sScore}`;
  speak(`${q.word}! ${q.word} starts with...`);
}
$("btn-repeat2").addEventListener("click", () => {
  const q = sQuiz[sIdx]; if(q) speak(`${q.word}! ${q.word} starts with...`);
});
$("board2").addEventListener("click", e => {
  const el = e.target.closest(".karuta"); if(!el || sAnswered) return;
  const q = sQuiz[sIdx];
  if(el.dataset.l === q.word[0].toUpperCase()){
    sAnswered = true; sScore++;
    el.classList.add("correct");
    speak(`Yes! ${q.word} starts with ${q.word[0].toUpperCase()}!`);
    setTimeout(() => { el.classList.remove("correct"); sIdx++; showSearchQ(); }, 1300);
  }else{
    el.classList.add("wrong");
    setTimeout(() => el.classList.remove("wrong"), 380);
  }
});
function finishSearch(){
  $("res-emoji").textContent = sScore === sQuiz.length ? "🏆" : "🎉";
  $("res-title").textContent = `${sQuiz.length}もん中 ${sScore}もん せいかい!`;
  $("res-ranks").innerHTML = "";
  show("scr-result");
  speak(sScore === sQuiz.length ? "Perfect!" : "Good job!");
}

// ============================================================
// ナビゲーション
// ============================================================
document.querySelectorAll(".mode-card").forEach(c => c.addEventListener("click", () => {
  const m = c.dataset.mode;
  if(m === "search") startSearch();
  else startKaruta(m);
}));
function goHome(){ speechSynthesis.cancel(); target = null; show("scr-mode"); }
$("btn-home").addEventListener("click", goHome);
$("btn-home2").addEventListener("click", goHome);
$("btn-again").addEventListener("click", () => {
  if(mode === "search") startSearch(); else startKaruta(mode);
});

show("scr-mode");
</script>
</body>
</html>
