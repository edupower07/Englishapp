<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800&family=Fredoka+One&display=swap" rel="stylesheet">
<link href="/__slides/_base.css" rel="stylesheet">
<style>
body{background:linear-gradient(135deg,#fffbe7,#fff);display:block;padding:46px 90px}
h1{font-size:2.5rem;font-weight:800;animation:popin .6s both}
h1 .en{color:#d35400}
h1 .book{font-size:2.6rem;vertical-align:-6px;margin-right:10px}
.sub{font-size:1.1rem;font-weight:800;color:#8d7b58;margin-top:6px;animation:fadein .6s .3s both}
.feats{margin-top:26px;display:grid;grid-template-columns:1fr 1fr;gap:14px;text-align:left}
.f{background:#fff;border:4px solid #fdcb6e;border-radius:18px;padding:14px 20px;font-weight:800;font-size:1.22rem;
  box-shadow:0 4px 10px rgba(0,0,0,.07);display:flex;align-items:center;gap:14px;animation:popin .5s both;line-height:1.5}
.f .i{font-size:2rem;flex-shrink:0}
.f small{display:block;font-size:.85rem;color:#7f8c9b;font-weight:700}
.f:nth-child(1){animation-delay:.8s}.f:nth-child(2){animation-delay:1.7s}
.f:nth-child(3){animation-delay:2.6s}.f:nth-child(4){animation-delay:3.5s}
.f:nth-child(5){animation-delay:4.4s}.f:nth-child(6){animation-delay:5.3s}
</style></head><body>
<div class="dots" style="opacity:.35"></div>
<h1><span class="book">📖</span><span class="en">Picture Dictionary</span> 絵じてん の全機能</h1>
<div class="sub">ポータルの看板アプリ。3〜6年生のことばを、絵カードでまるごと。</div>
<div class="feats">
  <div class="f"><span class="i">🎴</span><span>絵カード860枚以上<small>3〜6年生の語彙を学年・単元別に収録</small></span></div>
  <div class="f"><span class="i">📚</span><span>学年別「学ぶ」モード<small>絵カードをめくって、ことばと音にふれる</small></span></div>
  <div class="f"><span class="i">✏️</span><span>「練習」モード<small>くり返しチャレンジして、ことばを定着</small></span></div>
  <div class="f"><span class="i">🎮</span><span>「ゲーム」モード<small>かるた・ビンゴ・神経衰弱・スペリングなど</small></span></div>
  <div class="f"><span class="i">🏦</span><span>単語バンク<small>全学年のことばを横断してゲームできる</small></span></div>
  <div class="f"><span class="i">📦</span><span>絵カードライブラリ<small>859枚を検索・保存・ZIP一括ダウンロード</small></span></div>
</div>
</body></html>
